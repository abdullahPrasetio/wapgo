name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  GO_VERSION: "1.25"
  BINARY: wapgo

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  # ── Build cross-platform CLI binaries ────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          go build -C cli \
            -ldflags="-s -w -X 'github.com/abdullahPrasetio/wapgo/cli/commands.Version=${{ github.ref_name }}'" \
            -o ../dist/${{ env.BINARY }}_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}/${{ env.BINARY }} \
            ./cmd

      - name: Package tarball
        run: |
          cd dist/${{ env.BINARY }}_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}
          tar -czf ../${{ env.BINARY }}_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz ${{ env.BINARY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}
          path: dist/${{ env.BINARY }}_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          retention-days: 1

  # ── Create GitHub Release and attach all tarballs ────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Pull the section for this tag from CHANGELOG.md
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' to match CHANGELOG version header (e.g. [0.6.0])
          SEMVER="${VERSION#v}"
          NOTES=$(awk "/^## \[${SEMVER}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a temp file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-rc.1 → prerelease
          files: |
            dist/*.tar.gz
            dist/checksums.txt
