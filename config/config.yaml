app:
  env: development
  port: "8080"
  name: wapgo-service
  cors_allowed_origins: "http://localhost:3000"

db:
  driver: postgres
  host: localhost
  port: "5432"
  name: mydb
  user: user
  password: password
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_life: "5m"
  auto_migrate: true
  sslmode: disable

redis:
  url: "redis://localhost:6379"
  password: ""
  db: 0

kafka:
  brokers: "localhost:9092"
  group_id: "wapgo-service-group"

rabbitmq:
  dsn: "amqp://guest:guest@localhost:5672/"
  exchange: "wapgo-exchange"

log:
  level: info
  to_file: false
  file_path: "logs/app.log"

services:
  user_url: "http://user-service:8080"
  order_url: "http://order-service:8080"
