apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wapgo-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: wapgo

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP traffic only from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP

    # Allow Prometheus scraping from the monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP

  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Allow connections to Postgres
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP

    # Allow connections to Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP

    # Allow connections to Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
          protocol: TCP

    # Allow connections to RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
          protocol: TCP

    # Allow OTLP traces to the collector
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4318
          protocol: TCP

    # Allow HTTPS to external services (inter-service HTTP calls)
    - ports:
        - port: 443
          protocol: TCP
