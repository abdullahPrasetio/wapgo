apiVersion: v1
kind: ConfigMap
metadata:
  name: wapgo-config
  namespace: default
  labels:
    app: wapgo
data:
  APP_NAME: "wapgo-service"
  APP_ENV: "production"
  APP_PORT: "8080"
  DB_DRIVER: "postgres"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "wapgo"
  DB_SSLMODE: "require"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "kafka-svc:9092"
  RABBITMQ_HOST: "rabbitmq-svc"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  LOG_LEVEL: "info"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_EXPIRATION: "60"
  OBSERVABILITY_PROVIDER: "otel"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-svc:4318"
