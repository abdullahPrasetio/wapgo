apiVersion: v1
kind: Secret
metadata:
  name: wapgo-secret
  namespace: default
  labels:
    app: wapgo
type: Opaque
# All values must be base64-encoded. Replace with real secrets before deploying.
# Generate: echo -n 'value' | base64
stringData:
  DB_USER: "wapgo_user"
  DB_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  RABBITMQ_USER: "wapgo"
  RABBITMQ_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_MIN_32_CHAR_RANDOM_SECRET"
  ELASTIC_APM_SECRET_TOKEN: ""
